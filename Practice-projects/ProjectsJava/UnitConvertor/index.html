<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="upper-container">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input id="input-el" type="number">
        <button id="btn-el">CONVERT</button>
    </div>  
    <div id="lower-container" >
        <div id="len" class="data"> 
            <h4>Length(Meter/Feet)</h4>
            <p id="length"></p>
        </div>
        <div id="vol" class="data">
            <h4>Volume(liters/Gallons)</h4>
            <p id="volume"></p>
        </div>
        <div id="mass" class="data">
            <h4>Mass(KilloGrams/Pounds)</h4>
            <p id="Mass"></p>
        </div>
    </div>
    <script src="first.js"></script>
</body>
</html>
